steps:
  - 1. 访问 https://192.168.16.203:49187/#/login?redirect=%2Fredirect 并使用 admin/Hubble_Service!1088 登录
  - 2. 在左侧导航栏点击 ICM 项目，再点击设备信息
  - 3. 点击【新增】按钮，打开“添加设备信息”弹窗
  - 4. 连接类型选择“连接器-1”
  - 5. 设备类型选择“标准设备”
  - 6. 依次填写设备名称、设备IP、设备端口、MAC、网络掩码、VNC账号、VNC密码
  - 7. 将“是否允许控制”置为“是”，设备状态选择“在线”，填写备注
  - 8. 点击【确定】按钮
expected: &expected_results
  - 1. 登录成功，跳转至系统首页
  - 2. 设备信息列表正常加载
  - 3. 弹出“添加设备信息”弹窗，字段完整可编辑
  - 4-7. 各字段可正常下拉选择与输入，无校验报错
  - 8. 弹窗关闭并提示“新增成功”，列表内新增一行记录，设备名称为 TestDev_01，IP 为 192.168.1.100，状态为 在线
